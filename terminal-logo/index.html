<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Animated terminal-text RPI logo study built from pixel streams and the official logo geometry.">
  <title>RPI Terminal Motion Study</title>
  <link href="terminal-logo.css" rel="stylesheet" type="text/css">
</head>

<body>
  <div class="page-wrapper terminal_logo_page">
    <header class="terminal_logo_header">
      <a class="terminal_logo_backlink" href="../">RPI LOGO GENERATOR</a>
      <p class="terminal_logo_status">ANIMATED TERMINAL STUDY</p>
    </header>

    <main class="main-wrapper">
      <section class="section_terminal_logo" aria-labelledby="terminal-logo-title">
        <div class="padding-global">
          <div class="container-large">
            <div class="terminal_logo_shell">
              <div class="terminal_logo_hud" aria-hidden="true">
                <span>root@rpi:~$ render --mode terminal --shape logo --motion live</span>
                <span>surface:black font:geist-pixel-square state:animated</span>
              </div>

              <h1 id="terminal-logo-title" class="sr-only">RPI terminal motion study</h1>

              <div class="terminal_logo_viewport" data-terminal-viewport>
                <div class="terminal_logo_noise" aria-hidden="true"></div>
                <div class="terminal_logo_background" data-terminal-background aria-hidden="true"></div>
                <div class="terminal_logo_beam" aria-hidden="true"></div>

                <div class="terminal_logo_stage" aria-hidden="true">
                  <div class="terminal_logo_glow"></div>
                  <div class="terminal_logo_grid"></div>
                  <div class="terminal_logo_mask">
                    <div class="terminal_logo_lines" data-terminal-lines></div>
                  </div>

                  <svg class="terminal_logo_outline" viewBox="0 0 250 150.911" preserveAspectRatio="xMidYMid meet"
                    xmlns="http://www.w3.org/2000/svg">

                      d="M250.042 110.185L248.475 111.751H233.761L232.195 110.185V1.5667L233.767 0H248.481L250.047 1.5667V110.185H250.042Z" />

                </div>
              </div>

              <p class="terminal_logo_caption">Animated terminal-text field shaped from the official RPI logo geometry for fast local testing.</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="terminal-logo.js"></script>
</body>

</html>
